name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sketch:
          - kfs_esp_dht22

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Install board cores
        run: |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"

      - name: Build for ESP8266 (D1 Mini)
        run: >-
          arduino-cli compile
          --fqbn "esp8266:esp8266:d1_mini:eesz=1M64"
          "${{ matrix.sketch }}/"

      - name: Build for ESP32
        run: >-
          arduino-cli compile
          --fqbn "esp32:esp32:esp32dev"
          "${{ matrix.sketch }}/"

      - name: Upload ESP8266 firmware
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.sketch }}-esp8266"
          path: "${{ matrix.sketch }}/build/esp8266.esp8266.d1_mini/*.bin"

      - name: Upload ESP32 firmware
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.sketch }}-esp32"
          path: "${{ matrix.sketch }}/build/esp32.esp32.esp32dev/*.bin"
