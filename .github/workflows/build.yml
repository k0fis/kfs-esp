name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Arduino Lint
        uses: arduino/arduino-lint-action@v2
        with:
          compliance: specification
          project-type: sketch
          recursive: true

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Static analysis (cppcheck)
        run: >-
          cppcheck
          --enable=warning,performance,portability
          --error-exitcode=1
          --suppress=missingIncludeSystem
          --suppress=unknownMacro
          --inline-suppr
          -I shared/
          kfs_esp_dht22/ shared/

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        sketch:
          - kfs_esp_dht22

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Configure board manager URLs
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            "https://arduino.esp8266.com/stable/package_esp8266com_index.json" \
            "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

      - name: Install board cores
        run: |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"

      - name: Build for ESP8266 (D1 Mini)
        run: >-
          arduino-cli compile
          --fqbn "esp8266:esp8266:d1_mini:eesz=4M2M"
          --library shared
          --output-dir "build/esp8266"
          "${{ matrix.sketch }}/"

      - name: Build for ESP32
        run: >-
          arduino-cli compile
          --fqbn "esp32:esp32:esp32"
          --library shared
          --output-dir "build/esp32"
          "${{ matrix.sketch }}/"

      - name: Upload ESP8266 firmware
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.sketch }}-esp8266"
          path: "build/esp8266/*.bin"

      - name: Upload ESP32 firmware
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.sketch }}-esp32"
          path: "build/esp32/*.bin"
