name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        sketch:
          - kfs_esp_dht22

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Configure board manager URLs
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            "https://arduino.esp8266.com/stable/package_esp8266com_index.json" \
            "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

      - name: Install board cores
        run: |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"

      - name: Build for ESP8266 (D1 Mini)
        run: >-
          arduino-cli compile
          --fqbn "esp8266:esp8266:d1_mini:eesz=4M2M"
          --library shared
          "${{ matrix.sketch }}/"

      - name: Build for ESP32
        run: >-
          arduino-cli compile
          --fqbn "esp32:esp32:esp32dev"
          --library shared
          "${{ matrix.sketch }}/"

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp "${{ matrix.sketch }}"/build/esp8266.esp8266.d1_mini/*.bin release/ 2>/dev/null || true
          cp "${{ matrix.sketch }}"/build/esp32.esp32.esp32dev/*.bin release/ 2>/dev/null || true
          cd release
          for f in *.bin; do
            [ -f "$f" ] || continue
            mv "$f" "${{ matrix.sketch }}-${f}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.bin
          generate_release_notes: true
