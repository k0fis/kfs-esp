name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        sketch:
          - kfs_esp_dht22

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Configure board manager URLs
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            "https://arduino.esp8266.com/stable/package_esp8266com_index.json" \
            "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

      - name: Install board cores
        run: |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"

      - name: Build for ESP8266 (D1 Mini)
        run: >-
          arduino-cli compile
          --fqbn "esp8266:esp8266:d1_mini:eesz=4M2M"
          --library shared
          --output-dir "build/esp8266"
          "${{ matrix.sketch }}/"

      - name: Build for ESP32
        run: >-
          arduino-cli compile
          --fqbn "esp32:esp32:esp32"
          --library shared
          --output-dir "build/esp32"
          "${{ matrix.sketch }}/"

      - name: Prepare release assets
        run: |
          mkdir -p release
          for f in build/esp8266/*.bin build/esp32/*.bin; do
            [ -f "$f" ] || continue
            dir=$(basename "$(dirname "$f")")
            name=$(basename "$f")
            cp "$f" "release/${{ matrix.sketch }}-${dir}-${name}"
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.bin
          generate_release_notes: true
